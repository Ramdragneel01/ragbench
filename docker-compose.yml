services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8081:8081"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - backend
